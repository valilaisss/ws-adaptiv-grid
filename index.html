<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>QUOTES - GRID</title>
</head>
<body>
  
  <div class="grid-container">
    
    <div class="card einstein" style="--bg: #F3FFA5;">
      <p>«Воображение важнее, чем знания»</p>
      <img src="images/epshtein.png" style="width: 100%; height: auto;">
    </div>
    <div class="card legs only-photo" style="--bg: #61FFF7;">
      <img src="images/legs.png" style="width: 65%; height: auto;">
    </div>

    <div class="card bojack" style="--bg: #FF51DC;">
      <p>«Сделай миру одолжение, сверни на встречку...»</p>
      <img src="images/bojack.png" style="width: 100%; height: auto;">
    </div>
    <div class="card pony" style="--bg: #ACA9FF;">
      <p>«Я могу украсть ваши души и положить в это зеркальце!»</p>
      <img src="images/pony.png" style="width: 49%; height: 77%;">
    </div>
    <div class="card yolandi" style="--bg: #FF8989;">
      <h2>«Не готовь курицу, я готовлю курицу»</h2>
      <img src="images/yolandi.png" style="width: auto; height: 70%; padding: 0;">
    </div>

    <div class="card wests" style="--bg: #ACA9FF;">
      <p>«Я не люблю ****** и не доверяю им.»</p>
      <img src="images/wests.png" style="width: 65%; height: auto;">
    </div>
    <div class="card apple only-photo" style="--bg: #F3FFA5;">
      <img src="images/apple.png" style="width: 65%; height: auto;">
    </div>

    <div class="card cartman" style="--bg: #61FFF7;">
      <p>«Уважайте<br>мою <br>власть»</p>
      <img src="images/cartman.png" style="width: auto; height: 60%;">
    </div>
    <div class="card grimes" style="--bg: #FF51DC;">
      <p>«Я просто хочу делать то, что кажется мне красивым и странным»</p>
      <img src="images/grimes.png" style="width: 100%; height: auto; padding: 0;">
    </div>

  </div>

</body>
</html>
